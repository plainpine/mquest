<!-- templates/select_quest_admin.html -->
{% extends "base.html" %}

{% block title %}クエスト選択{% endblock %}

{% block content %}
<h1>{{ title }} / {{ level }} のクエストを選んでください</h1>

<ul class="selectable-list">
  {% for quest in quests %}
    <li data-url="{{ url_for('quest_run_group', quest_id=quest.id) }}" onclick="window.location.href=this.dataset.url">
      ID: {{ quest.id }} - <span class="markdown" data-content="{{ quest.questname | e }}"></span>
    </li>
  {% endfor %}
</ul>

<a class="button secondary" href="{{ url_for('select_level_admin', title=title) }}">レベル選択に戻る</a>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
    svg: { fontCache: 'global' }
  };

  function renderMarkdownAndMath() {
    if (typeof marked === 'undefined') return;
    if (marked.use) {
      marked.use({ breaks: true });
    } else if (marked.setOptions) {
      marked.setOptions({ breaks: true });
    }

    document.querySelectorAll('.markdown').forEach(function(div) {
      var md = div.getAttribute('data-content');
      if (!md) return;
      md = md.replace(/\\n/g, '\n');
      try {
        div.innerHTML = marked.parse(md);
      } catch (e) {
        console.error('Markdown parse error:', e);
        div.textContent = md;
      }
    });
    if (window.MathJax && MathJax.typesetPromise) {
      MathJax.typesetPromise();
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    renderMarkdownAndMath();
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
{% endblock %}
