{% extends "base.html" %}
{% block title %}講師の管理{% endblock %}

{% block content %}
<h2>講師の管理</h2>

<!-- 新規講師登録フォーム -->
<details style="background: #e1f5fe; padding: 1rem; margin-bottom: 2rem; border-radius: 8px;">
    <summary style="cursor: pointer; font-weight: bold;">新規講師登録</summary>
    <form action="{{ url_for('add_teacher') }}" method="POST" style="margin-top: 1rem;">
        <div class="form-group">
            <label>ユーザー名:</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label>ニックネーム:</label>
            <input type="text" name="nickname" class="form-control">
        </div>
        <div class="form-group">
            <label>パスワード:</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">講師を登録</button>
    </form>
</details>

<h3>講師の一覧</h3>
<table border="1" cellpadding="5" style="width: 100%; border-collapse: collapse;">
  <thead>
    <tr style="background: #f5f5f5;">
      <th>アバター</th>
      <th>ユーザー名</th>
      <th>ニックネーム</th>
      <th>操作</th>
    </tr>
  </thead>
  <tbody>
    {% for teacher in teachers %}
    <tr>
      <td style="text-align: center;">
        <div style="width: 40px; height: 40px; border-radius: 50%; overflow: hidden; margin: 0 auto; border: 1px solid #ccc;">
            <img src="{{ url_for('static', filename='images/avatars/' + (teacher.avatar if teacher.avatar else 'default.svg')) }}" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
      </td>
      <td>{{ teacher.username }}</td>
      <td>{{ teacher.nickname or "未設定" }}</td>
      <td>
        <a href="{{ url_for('edit_user_admin', user_id=teacher.id) }}" class="btn btn-secondary">編集</a>
        <form action="{{ url_for('delete_user', user_id=teacher.id) }}" method="POST" onsubmit="return confirm('本当に削除しますか？');" style="display:inline;">
            <button type="submit" class="btn btn-danger">削除</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<div style="margin-top: 2rem;">
    <a href="{{ url_for('dashboard_' + current_user.role) }}" class="button">ダッシュボードに戻る</a>
</div>
{% endblock %}
